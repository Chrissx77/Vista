name: vista
description: "Un nuovo punto Vista."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.0.0
  flutter_riverpod: ^2.5.1
  http: ^1.2.0
  image_picker: ^1.2.2
  permission_handler: ^11.3.1
  cached_network_image: ^3.4.1
  geolocator: ^14.0.1
  geocoding: ^4.0.0
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  flutter_map_marker_cluster: ^8.2.2
  share_plus: ^13.1.0
  url_launcher: ^6.3.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  image: ^4.5.4

flutter_launcher_icons:
  android: true
  ios: true
  # Sorgente con zoom: `dart run tool/zoom_app_icon.dart` poi `dart run flutter_launcher_icons`
  image_path: assets/launcher/icon_source.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/launcher/icon_source.png
  adaptive_icon_foreground_inset: 8
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - images/
